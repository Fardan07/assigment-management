<!DOCTYPE html>
<html lang="id">
<head>
    <base href="./" />
    <title>Data Fasilitas - Facility Helpdesk</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <style>
        .facility-badge { border-radius: 6px; padding: 4px 8px; font-weight: 600; font-size: 0.75rem; }
        .condition-good { background-color: #e8fff3; color: #50cd89; }
        .condition-bad { background-color: #fff5f8; color: #f1416c; }
    </style>
</head>
<body id="kt_app_body" class="app-default" data-kt-app-sidebar-enabled="true" data-kt-app-sidebar-fixed="true" data-kt-app-sidebar-push-header="true" data-kt-app-sidebar-push-toolbar="true" data-kt-app-sidebar-push-footer="true">
    <div class="d-flex flex-column flex-root app-root" id="kt_app_root">
        <div class="app-page flex-column flex-column-fluid" id="kt_app_page">
            <div id="kt_app_header" class="app-header" data-kt-sticky="true" data-kt-sticky-activate="{default: false, lg: true}" data-kt-sticky-name="app-header-sticky" data-kt-sticky-offset="{default: false, lg: '300px'}">
                <div class="app-container container-fluid d-flex flex-stack" id="kt_app_header_container">
                    <div class="d-flex align-items-center d-block d-lg-none ms-n3" title="Show sidebar menu">
                        <div class="btn btn-icon btn-active-color-primary w-35px h-35px me-2" id="kt_app_sidebar_mobile_toggle">
                            <i class="ki-outline ki-abstract-14 fs-2"></i>
                        </div>
                    </div>
                    <div class="d-flex flex-stack flex-lg-row-fluid" id="kt_app_header_wrapper">
                        <div class="page-title gap-4 me-3 mb-5 mb-lg-0">
                            <h1 class="text-gray-900 fw-bolder m-0 fs-2">Inventaris Fasilitas Gedung</h1>
                            <ul class="breadcrumb breadcrumb-separatorless fw-semibold fs-7 my-1">
                                <li class="breadcrumb-item text-muted">Facility Helpdesk</li>
                                <li class="breadcrumb-item"><span class="bullet bg-gray-300 w-5px h-2px"></span></li>
                                <li class="breadcrumb-item text-dark">Fasilitas</li>
                            </ul>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="d-flex align-items-center bg-light-primary rounded-pill px-4 py-2 border border-primary border-opacity-25">
                                <i class="ki-outline ki-shield-tick text-primary fs-4 me-2"></i>
                                <span class="text-primary fw-bold fs-7" id="current-role-badge">ROLE: -</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="app-wrapper flex-column flex-row-fluid" id="kt_app_wrapper">
                <div id="kt_app_sidebar" class="app-sidebar flex-column"></div>
                <div class="d-flex flex-column flex-column-fluid">
                    <div id="kt_app_content" class="app-content flex-column-fluid pt-6">
                        <div id="kt_app_content_container" class="app-container container-fluid">
                            
                            <div class="row g-5 g-xl-8">
                                <div class="col-xl-9">
                                    <div class="card shadow-sm h-100">
                                        <div class="card-header border-0 pt-6">
                                            <div class="card-title">
                                                <div class="d-flex align-items-center position-relative my-1">
                                                    <i class="ki-outline ki-magnifier fs-3 position-absolute ms-5"></i>
                                                    <input type="text" class="form-control form-control-solid w-250px ps-13" placeholder="Cari aset fasilitas..." />
                                                </div>
                                            </div>
                                            <div class="card-toolbar d-flex gap-2">
<button class="btn btn-info" id="btn-print-all-barcode" onclick="printAllBarcodes()">
<i class="ki-outline ki-printer fs-2"></i> Cetak Semua Barcode
</button>
<button class="btn btn-primary" id="btn-add-facility">
                                                    <i class="ki-outline ki-plus fs-2"></i> Tambah Aset
                                                </button>
                                            </div>
                                        </div>
                                        <div class="card-body pt-2">
                                            <div class="table-responsive">
                                                <table class="table table-row-dashed table-row-gray-300 align-middle gs-0 gy-4" id="facility-table">
                                                    <thead>
                                                        <tr class="fw-bold text-muted bg-light">
                                                            <th class="ps-4 min-w-100px rounded-start">ID Aset</th>
                                                            <th class="min-w-200px">Nama Fasilitas</th>
                                                            <th class="min-w-150px">Lokasi Gedung</th>
                                                            <th class="min-w-100px text-center">Barcode</th>
                                                            <th class="min-w-100px text-center">Kondisi</th>
                                                            <th class="min-w-100px text-end pe-4 rounded-end">Opsi</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-xl-3">
                                    <div class="card shadow-sm mb-5">
                                        <div class="card-header border-0 pt-6">
                                            <h3 class="card-title fw-bold">Statistik Aset</h3>
                                        </div>
                                        <div class="card-body pt-2">
                                            <div id="facility-pie-chart" style="height: 200px;"></div>
                                        </div>
                                    </div>
                                    <div class="card shadow-sm">
                                        <div class="card-header border-0 pt-6">
                                            <h3 class="card-title fw-bold">Daftar Kategori</h3>
                                        </div>
                                        <div class="card-body pt-0" id="category-list">
                                            </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Print Barcode -->
    <div class="modal fade" tabindex="-1" id="modal_print_barcode">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Cetak Barcode</h3>
                    <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" data-bs-dismiss="modal" aria-label="Close">
                        <i class="ki-outline ki-cross fs-1"></i>
                    </div>
                </div>
                <div class="modal-body text-center" id="print_barcode_area">
                    <h4 id="barcode_asset_name" class="mb-5"></h4>
                    <svg id="barcode_canvas"></svg>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Tutup</button>
                    <button type="button" class="btn btn-primary" onclick="printBarcode()">Cetak</button>
                </div>
            </div>
        </div>
    </div>

    
    <!-- Modal Facility Form -->
    <div class="modal fade" tabindex="-1" id="modal_facility_form">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <form id="form_facility" onsubmit="event.preventDefault(); saveFacility();">
                    <div class="modal-header">
                        <h3 class="modal-title">Tambah Aset</h3>
                        <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" data-bs-dismiss="modal" aria-label="Close">
                            <i class="ki-outline ki-cross fs-1"></i>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div class="row g-5">
                            <div class="col-md-6">
                                <label class="required form-label">Nama Fasilitas</label>
                                <input type="text" class="form-control" name="facility_name" required placeholder="Contoh: Meja Rapat" />
                            </div>
                            <div class="col-md-6">
                                <label class="required form-label">Tipe Kategori</label>
                                <select class="form-select" name="facility_type" required>
                                    <option value="">Pilih Tipe</option>
                                    <option value="Furniture">Furniture</option>
                                    <option value="AC/Pendingin">AC/Pendingin</option>
                                    <option value="Elektronik">Elektronik</option>
                                    <option value="Alat Tulis">Alat Tulis</option>
                                    <option value="Jaringan">Jaringan</option>
                                    <option value="Plumbing">Plumbing</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Lantai</label>
                                <input type="text" class="form-control" name="floor_level" placeholder="Contoh: Lantai 2" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Ruangan</label>
                                <input type="text" class="form-control" name="room_name" placeholder="Contoh: Ruang Meeting A" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Brand</label>
                                <input type="text" class="form-control" name="brand" placeholder="Contoh: Informa" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Model</label>
                                <input type="text" class="form-control" name="model" placeholder="Model tipe barang" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Serial Number</label>
                                <input type="text" class="form-control" name="serial_number" placeholder="SN-XXXX" />
                            </div>
                            <div class="col-md-6">
                                <label class="required form-label">Kondisi</label>
                                <select class="form-select" name="condition_status" required>
                                    <option value="good">Good</option>
                                    <option value="need_repair">Need Repair</option>
                                    <option value="broken">Broken</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Catatan Tambahan</label>
                                <textarea class="form-control" name="notes" rows="2" placeholder="Catatan"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary" id="btn_save_facility">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Detail Aset -->
    <div class="modal fade" tabindex="-1" id="modal_facility_detail">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Detail Aset: <span id="detail_facility_code" class="text-primary"></span></h3>
                    <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" data-bs-dismiss="modal" aria-label="Close">
                        <i class="ki-outline ki-cross fs-1"></i>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Nama Fasilitas</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_facility_name"></span></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Tipe Kategori</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_facility_type"></span></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Kondisi</label>
                        <div class="col-lg-8" id="detail_condition_status"></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Lokasi</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_location"></span></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Brand / Model</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_brand_model"></span></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Serial Number</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_serial_number"></span></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Barcode SN</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_barcode"></span></div>
                    </div>
                    <div class="row mb-7">
                        <label class="col-lg-4 fw-semibold text-muted">Catatan</label>
                        <div class="col-lg-8"><span class="fw-bold fs-6 text-gray-800" id="detail_notes"></span></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Tutup</button>
                    <button type="button" class="btn btn-warning" id="btn_edit_trigger">Edit Fasilitas</button>
                    <button type="button" class="btn btn-danger" id="btn_delete_trigger">Hapus Fasilitas</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="assets/plugins/global/plugins.bundle.js"></script>

    <script src="assets/js/scripts.bundle.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script src="js/facilities.js"></script>
</body>
</html>
