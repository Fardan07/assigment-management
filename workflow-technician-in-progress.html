<!DOCTYPE html>
<html lang="id">
<head>
    <base href="./" />
    <title>Sedang Dikerjakan - Facility Helpdesk</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
</head>
<body id="kt_app_body" data-kt-app-header-fixed-mobile="true" data-kt-app-sidebar-enabled="true" data-kt-app-sidebar-fixed="true" class="app-default">
    <div class="d-flex flex-column flex-root app-root" id="kt_app_root">
        <div class="app-page flex-column flex-column-fluid" id="kt_app_page">
            <div id="kt_app_header" class="app-header">
                <div class="app-container container-fluid d-flex flex-stack" id="kt_app_header_container">
                    <div class="page-title d-flex flex-column justify-content-center flex-wrap me-3">
                        <h1 class="page-heading d-flex text-dark fw-bold fs-3 flex-column justify-content-center my-0">Dashboard Teknisi</h1>
                        <ul class="breadcrumb breadcrumb-separatorless fw-semibold fs-7 my-0 pt-1">
                            <li class="breadcrumb-item text-muted">Operasional</li>
                            <li class="breadcrumb-item"><span class="bullet bg-gray-400 w-5px h-2px"></span></li>
                            <li class="breadcrumb-item text-dark">Sedang Dikerjakan</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="app-wrapper flex-column flex-row-fluid" id="kt_app_wrapper">
                <div id="kt_app_sidebar" class="app-sidebar flex-column"></div>
                <div class="app-main flex-column flex-row-fluid" id="kt_app_main">
                    <div class="d-flex flex-column flex-column-fluid">
                        <div id="kt_app_content" class="app-content flex-column-fluid">
                            <div id="kt_app_content_container" class="app-container container-fluid">
                                
                                <div class="card shadow-sm">
                                    <div class="card-header border-0 pt-6">
                                        <div class="card-title">
                                            <div class="d-flex align-items-center position-relative my-1">
                                                <i class="ki-outline ki-magnifier fs-3 position-absolute ms-5"></i>
                                                <input type="text" data-kt-report-table-filter="search" class="form-control form-control-solid w-250px ps-13" placeholder="Cari laporan..." />
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card-body py-4">
                                        <table class="table align-middle table-row-dashed fs-6 gy-5" id="report-table">
                                            <thead>
                                                <tr class="text-start text-muted fw-bold fs-7 text-uppercase gs-0">
                                                    <th class="min-w-100px">ID Laporan</th>
                                                    <th class="min-w-150px">Judul</th>
                                                    <th class="min-w-100px">Kategori</th>
                                                    <th class="min-w-100px">Status</th>
                                                    <th class="min-w-100px">Urgensi</th>
                                                    <th class="text-end min-w-100px">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody class="text-gray-600 fw-semibold">
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Work Update -->
    <div class="modal fade" id="modal-update" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered mw-650px">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="fw-bold">Update Status Pekerjaan</h2>
                    <div class="btn btn-icon btn-sm btn-active-icon-primary" data-bs-dismiss="modal">
                        <i class="ki-outline ki-cross fs-1"></i>
                    </div>
                </div>
                <div class="modal-body py-10 px-lg-17">
                    <div id="modal-report-info" class="mb-7 p-4 bg-light-info rounded">
                        <strong id="modal-report-title"></strong>
                        <p id="modal-current-status" class="mt-2 text-muted"></p>
                    </div>
                    <form id="form-update" class="form">
                        <input type="hidden" name="report_id" />
                        <div class="fv-row mb-7">
                            <label class="required fs-6 fw-bold mb-2">Update Status</label>
                            <select class="form-select form-control-solid" name="status" required>
                                <option value="in_progress">Mulai Pekerjaan (In Progress)</option>
                                <option value="pending_review">Serah untuk Review (Pending Review)</option>
                            </select>
                        </div>
                        <div class="fv-row mb-7">
                            <label class="fs-6 fw-bold mb-2">Catatan Teknisi</label>
                            <textarea class="form-control form-control-solid" name="technician_note" rows="3" placeholder="Catatan pekerjaan atau progress"></textarea>
                        </div>
                        <div class="fv-row mb-7">
                            <label class="fs-6 fw-bold mb-2">Foto Hasil (Opsional)</label>
                            <input type="file" class="form-control form-control-solid" name="photo_after" accept="image/*" />
                            <small class="text-muted">Format: JPG, PNG, GIF. Maksimal 5MB</small>
                            <div id="photo-preview" class="mt-3"></div>
                        </div>
                        <div class="text-center pt-15">
                            <button type="reset" class="btn btn-light me-3" data-bs-dismiss="modal">Batal</button>
                            <button type="submit" class="btn btn-primary">
                                <span class="indicator-label">Update Status</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/plugins/global/plugins.bundle.js"></script>
    <script src="assets/js/scripts.bundle.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js?v=20260417f"></script>
    <script src="js/workflow-technician-in-progress.js?v=20260417f"></script>
</body>
</html>
