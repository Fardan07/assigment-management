<!DOCTYPE html>
<html lang="id">

<head>
    <base href="./" />
    <title>Login - Mini Inventory</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
</head>

<body id="kt_body" class="app-blank">
    <script>var defaultThemeMode = "light"; var themeMode; if (document.documentElement) { if (document.documentElement.hasAttribute("data-bs-theme-mode")) { themeMode = document.documentElement.getAttribute("data-bs-theme-mode"); } else { if (localStorage.getItem("data-bs-theme") !== null) { themeMode = localStorage.getItem("data-bs-theme"); } else { themeMode = defaultThemeMode; } } if (themeMode === "system") { themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; } document.documentElement.setAttribute("data-bs-theme", themeMode); }</script>
    <div class="d-flex flex-column flex-root" id="kt_app_root">
        <div class="d-flex flex-column flex-column-fluid flex-center">
            <div class="d-flex flex-center flex-column flex-column-fluid p-10">
                <!--begin::Login Card-->
                <div class="w-lg-500px bg-body rounded shadow-sm p-10 p-lg-15">
                    <!--begin::Logo & Title-->
                    <div class="text-center mb-11">
                        <div class="mb-5">
                            <img alt="Logo" src="assets/media/logos/default-small.svg" class="h-40px" />
                        </div>
                        <h1 class="text-gray-900 fw-bolder fs-2 mb-3">Mini Inventory</h1>
                        <div class="text-gray-500 fw-semibold fs-6">Sign in to your account</div>
                    </div>
                    <!--end::Logo & Title-->
                    <!--begin::Error Alert-->
                    <div class="alert alert-danger d-flex align-items-center d-none mb-8" id="login-error">
                        <i class="ki-outline ki-information-5 fs-2 text-danger me-3"></i>
                        <div class="d-flex flex-column">
                            <span class="fw-semibold" id="login-error-msg"></span>
                        </div>
                    </div>
                    <!--end::Error Alert-->
                    <!--begin::Login Form-->
                    <form id="login-form" novalidate autocomplete="off">
                        <!--begin::Username-->
                        <div class="fv-row mb-8">
                            <label class="form-label fs-6 fw-bold text-gray-900">Username</label>
                            <input type="text" id="login-username"
                                class="form-control form-control-lg form-control-solid"
                                placeholder="Enter username" autocomplete="username" />
                        </div>
                        <!--end::Username-->
                        <!--begin::Password-->
                        <div class="fv-row mb-8">
                            <label class="form-label fw-bold text-gray-900 fs-6">Password</label>
                            <input type="password" id="login-password"
                                class="form-control form-control-lg form-control-solid"
                                placeholder="Enter password" autocomplete="current-password" />
                        </div>
                        <!--end::Password-->
                        <!--begin::Submit-->
                        <div class="d-grid mb-10">
                            <button type="submit" id="login-submit" class="btn btn-primary btn-lg">
                                <span id="login-btn-text">
                                    <i class="ki-outline ki-entrance-right fs-3 me-2"></i>Sign In
                                </span>
                                <span id="login-btn-loading" class="d-none">
                                    <span class="spinner-border spinner-border-sm align-middle me-2"></span>Signing in...
                                </span>
                            </button>
                        </div>
                        <!--end::Submit-->
                    </form>
                    <!--end::Login Form-->
                    <!--begin::Footer-->
                    <div class="text-center">
                        <span class="text-gray-500 fs-7">Mini Inventory &bull; v1.0</span>
                    </div>
                    <!--end::Footer-->
                </div>
                <!--end::Login Card-->
            </div>
        </div>
    </div>

    <script src="assets/plugins/global/plugins.bundle.js"></script>
    <script src="assets/js/scripts.bundle.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
