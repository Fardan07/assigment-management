<!DOCTYPE html>
<html lang="id">
<head>
    <base href="./" />
    <title>Dashboard Site Manager - Facility Helpdesk</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
</head>
<body id="kt_app_body" data-kt-app-header-fixed-mobile="true" data-kt-app-sidebar-enabled="true" data-kt-app-sidebar-fixed="true" data-kt-app-sidebar-push-header="true" data-kt-app-sidebar-push-toolbar="true" data-kt-app-sidebar-push-footer="true" class="app-default">
    <div class="d-flex flex-column flex-root app-root" id="kt_app_root">
        <div class="app-page flex-column flex-column-fluid" id="kt_app_page">
            <div id="kt_app_header" class="app-header" data-kt-sticky="true" data-kt-sticky-activate="{default: false, lg: true}" data-kt-sticky-name="app-header-sticky" data-kt-sticky-offset="{default: false, lg: '300px'}">
                <div class="app-container container-fluid d-flex flex-stack" id="kt_app_header_container">
                    <div class="d-flex align-items-center d-block d-lg-none ms-n3" title="Show sidebar menu">
                        <div class="btn btn-icon btn-active-color-primary w-35px h-35px me-2" id="kt_app_sidebar_mobile_toggle">
                            <i class="ki-outline ki-abstract-14 fs-2"></i>
                        </div>
                    </div>
                    <div class="d-flex flex-stack flex-lg-row-fluid" id="kt_app_header_wrapper">
                        <div class="page-title gap-4 me-3 mb-5 mb-lg-0">
                            <h1 class="text-gray-900 fw-bolder m-0 fs-2">Riwayat Approval</h1>
                            <ul class="breadcrumb breadcrumb-separatorless fw-semibold fs-7 my-1">
                                <li class="breadcrumb-item text-muted">Facility Helpdesk</li>
                                <li class="breadcrumb-item"><span class="bullet bg-gray-300 w-5px h-2px"></span></li>
                                <li class="breadcrumb-item text-dark">Approval &amp; Review</li>
                            </ul>
                            
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="d-flex align-items-center bg-light-primary rounded-pill px-4 py-2 border border-primary border-opacity-25">
                                <i class="ki-outline ki-shield-tick text-primary fs-4 me-2"></i>
                                <span class="text-primary fw-bold fs-7" id="current-role-badge">ROLE: -</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="app-wrapper flex-column flex-row-fluid" id="kt_app_wrapper">
                <div id="kt_app_sidebar" class="app-sidebar flex-column"></div>
                <div class="app-main flex-column flex-row-fluid" id="kt_app_main">
                    <div class="d-flex flex-column flex-column-fluid">
                        <div id="kt_app_content" class="app-content flex-column-fluid">
                            <div id="kt_app_content_container" class="app-container container-fluid">
                                
                                <div class="card shadow-sm">
                                        <div class="card-header border-0 pt-6">
                                            <div class="card-title w-100 d-flex justify-content-between">
                                                <div class="d-flex align-items-center position-relative my-1">
                                                    <i class="ki-outline ki-magnifier fs-3 position-absolute ms-5"></i>
                                                    <input type="text" data-kt-report-table-filter="search" class="form-control form-control-solid w-250px ps-13" placeholder="Cari laporan..." />
                                                </div>
                                                <div class="d-flex align-items-center mb-1">
                                                    <select id="status-filter" class="form-select form-select-solid fw-bold">
                                                        <option value="all">Semua Riwayat</option>
                                                        <option value="approved">Approved</option>
                                                        <option value="rejected">Rejected / Revisi</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    <div class="card-body py-4">
                                        <table class="table align-middle table-row-dashed fs-6 gy-5" id="report-table">
                                            <thead>
                                                <tr class="text-start text-muted fw-bold fs-7 text-uppercase gs-0">
                                                    <th class="min-w-100px">ID Laporan</th>
                                                    <th class="min-w-150px">Judul</th>
                                                    <th class="min-w-100px">Teknisi</th>
                                                    <th class="min-w-100px">Status</th>
                                                    <th class="min-w-100px">Urgensi</th>
                                                    <th class="text-end min-w-100px">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody class="text-gray-600 fw-semibold">
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Review & Approval -->
    <div class="modal fade" id="modal-review" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered mw-650px">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="fw-bold">Detail Riwayat Pekerjaan</h2>
                    <div class="btn btn-icon btn-sm btn-active-icon-primary" data-bs-dismiss="modal">
                        <i class="ki-outline ki-cross fs-1"></i>
                    </div>
                </div>
                <div class="modal-body py-10 px-lg-17">
                    <div id="modal-report-info" class="mb-7 p-4 bg-light-info rounded">
                        <strong id="modal-report-title"></strong>
                        <p id="modal-technician-info" class="mt-2 text-muted"></p>
                        <p id="modal-technician-note" class="mt-2 text-gray-600"></p>
                        <p id="modal-rejection-reason" class="mt-2 text-danger" style="display:none;"></p>
                    </div>
                    <div class="row g-6 mb-7">
                        <div class="col-md-6">
                            <label class="fs-6 fw-bold mb-2">Foto Awal (Requester)</label>
                            <div class="border rounded p-3 bg-light min-h-175px d-flex align-items-center justify-content-center">
                                <img id="modal-photo-before" alt="Foto awal requester" style="display:none;max-width:100%;max-height:220px;border-radius:8px;object-fit:contain;" />
                                <div id="modal-photo-before-empty" class="text-muted fs-7 text-center">Tidak ada foto awal.</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-6 fw-bold mb-2">Foto Setelah Perbaikan (Teknisi)</label>
                            <div class="border rounded p-3 bg-light min-h-175px d-flex align-items-center justify-content-center">
                                <img id="modal-photo-after" alt="Foto setelah perbaikan teknisi" style="display:none;max-width:100%;max-height:220px;border-radius:8px;object-fit:contain;" />
                                <div id="modal-photo-after-empty" class="text-muted fs-7 text-center">Tidak ada foto setelah perbaikan.</div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center pt-15">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Tutup</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/plugins/global/plugins.bundle.js"></script>
    <script src="assets/js/scripts.bundle.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js?v=20260417e"></script>
    <script src="js/workflow-site-manager-history.js?v=20260417e"></script>
</body>
</html>
