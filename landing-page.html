<!DOCTYPE html>
<html lang="id">

<head>
    <base href="./" />
    <title>Laporan Saya - Facility Helpdesk</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <style>
        .welcome-gradient { background: linear-gradient(90deg, #009ef7 0%, #00b2ff 100%); }
        .action-card { transition: all 0.3s ease; cursor: pointer; border: 2px dashed #e1e3ea; }
        .action-card:hover { border-color: #009ef7; background-color: #f1faff; transform: translateY(-5px); }
    </style>
</head>

<body id="kt_app_body" data-kt-app-header-fixed-mobile="true" data-kt-app-sidebar-enabled="true"
    data-kt-app-sidebar-fixed="true" data-kt-app-sidebar-push-header="true" data-kt-app-sidebar-push-toolbar="true"
    data-kt-app-sidebar-push-footer="true" class="app-default">

    <div class="d-flex flex-column flex-root app-root" id="kt_app_root">
        <div class="app-page flex-column flex-column-fluid" id="kt_app_page">
            
            <div id="kt_app_header" class="app-header">
                <div class="app-container container-fluid d-flex flex-stack" id="kt_app_header_container">
                    <div class="d-flex align-items-center d-block d-lg-none ms-n3 me-1">
                        <div class="btn btn-icon btn-active-color-primary w-35px h-35px" id="kt_app_sidebar_mobile_toggle">
                            <i class="ki-outline ki-abstract-14 fs-2"></i>
                        </div>
                    </div>
                    <div class="d-flex align-items-center flex-grow-1 flex-lg-grow-0 me-lg-15">
                        <a href="landing-page.html">
                            <img alt="Logo" src="assets/media/logos/default-small.svg" class="h-30px" />
                        </a>
                    </div>
                </div>
            </div>
            <div class="app-wrapper flex-column flex-row-fluid" id="kt_app_wrapper">
                
                <div id="kt_app_sidebar" class="app-sidebar flex-column" data-kt-drawer="true" data-kt-drawer-name="app-sidebar" 
                    data-kt-drawer-activate="{default: true, lg: false}" data-kt-drawer-overlay="true" data-kt-drawer-width="225px" 
                    data-kt-drawer-direction="start" data-kt-drawer-toggle="#kt_app_sidebar_mobile_toggle">
                    </div>
                <div class="app-main flex-column flex-row-fluid" id="kt_app_main">
                    <div class="d-flex flex-column flex-column-fluid">
                        <div id="kt_app_content" class="app-content flex-column-fluid mt-5">
                            <div id="kt_app_content_container" class="app-container container-fluid">
                                
                                <div class="card welcome-gradient mb-8">
                                    <div class="card-body p-9 d-flex flex-column flex-md-row align-items-center justify-content-between">
                                        <div class="text-white">
                                            <h1 class="text-white fw-bold fs-2hx mb-2">Halo, <span id="user-display-name">User</span>! 👋</h1>
                                            <p class="fs-4 fw-semibold opacity-75">Ada fasilitas rusak? Laporkan segera lewat tombol di bawah.</p>
                                        </div>
                                        <div class="mt-5 mt-md-0">
                                            <button class="btn btn-warning fw-bold fs-6 px-8 py-4 shadow-sm">
                                                <i class="ki-outline ki-scan-barcode fs-1 me-2"></i> Scan QR Asset
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="row g-5 g-xl-10 mb-8">
                                    <div class="col-md-4">
                                        <div class="card action-card h-100" onclick="window.location.href='reports.html'">
                                            <div class="card-body d-flex flex-column align-items-center justify-content-center py-10">
                                                <i class="ki-outline ki-message-edit fs-3x text-primary mb-5"></i>
                                                <h3 class="text-dark fw-bold fs-2 mb-1">Buat Laporan</h3>
                                                <span class="text-muted fw-semibold fs-6">Input manual laporan baru</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="card h-100 bg-light-info border-0">
                                            <div class="card-body p-9">
                                                <h3 class="fw-bold text-dark mb-5">Progres Laporan Anda</h3>
                                                <div class="d-flex flex-wrap gap-3">
                                                    <div class="bg-white rounded p-4 border border-info min-w-125px">
                                                        <div class="fs-2 fw-bold text-info" id="stat-user-total">0</div>
                                                        <div class="fw-semibold text-gray-500">Total Lapor</div>
                                                    </div>
                                                    <div class="bg-white rounded p-4 border border-warning min-w-125px">
                                                        <div class="fs-2 fw-bold text-warning" id="stat-user-process">0</div>
                                                        <div class="fw-semibold text-gray-500">Diproses</div>
                                                    </div>
                                                    <div class="bg-white rounded p-4 border border-success min-w-125px">
                                                        <div class="fs-2 fw-bold text-success" id="stat-user-done">0</div>
                                                        <div class="fw-semibold text-gray-500">Selesai</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="card shadow-sm">
                                    <div class="card-header pt-7">
                                        <h3 class="card-title align-items-start flex-column">
                                            <span class="card-label fw-bold text-gray-800 fs-3">Riwayat Laporan Terakhir</span>
                                        </h3>
                                    </div>
                                    <div class="card-body pt-3">
                                        <div class="table-responsive">
                                            <table class="table table-row-dashed table-row-gray-300 align-middle gs-0 gy-4">
                                                <thead>
                                                    <tr class="fw-bold text-muted text-uppercase fs-7">
                                                        <th class="min-w-150px">Fasilitas</th>
                                                        <th class="min-w-100px text-center">Status</th>
                                                        <th class="min-w-100px text-end">Tanggal</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="user-report-list-body">
                                                    </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/plugins/global/plugins.bundle.js"></script>
    <script src="assets/js/scripts.bundle.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    
    <script>
        $(document).ready(function() {
            if (!requireLogin()) return;

            const user = window.auth.currentUser;
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            $('#user-display-name').text(user.full_name || 'Pengguna');

            // Ambil data khusus milik user yang login
            async function fetchUserDashboard() {
                try {
                    const response = await window.auth.fetch(`${APP_CONFIG.apiBaseUrl}/maintenance-report/datatables`, {
                        method: 'POST',
                        body: JSON.stringify({ draw: 1, start: 0, length: 300 })
                    });
                    const json = await response.json();
                    if (!response.ok) throw new Error(json.message || 'Gagal memuat data laporan.');

                    const allReports = json.data || [];
                    const reports = allReports.filter(r => String(r.reporter_id || '') === String(user.user_id || ''));

                    const inProcessStatuses = ['draft', 'submitted', 'assigned', 'in_progress', 'on_progress', 'pending_review', 'rejected'];
                    const doneStatuses = ['approved', 'solved', 'closed'];

                    $('#stat-user-total').text(reports.length);
                    $('#stat-user-process').text(reports.filter(r => inProcessStatuses.includes(String(r.status || '').toLowerCase())).length);
                    $('#stat-user-done').text(reports.filter(r => doneStatuses.includes(String(r.status || '').toLowerCase())).length);

                    let rows = '';
                    reports.slice(0, 5).forEach(r => {
                        const status = String(r.status || '-').toLowerCase();
                        const statusBadge = doneStatuses.includes(status) ? 'badge-light-success' : 'badge-light-warning';
                        rows += `
                            <tr>
                                <td><span class="text-dark fw-bold fs-6">${r.facility_name || r.title || 'Fasilitas Umum'}</span></td>
                                <td class="text-center"><span class="badge ${statusBadge}">${(r.status || '-')}</span></td>
                                <td class="text-end text-muted fw-bold">${new Date(r.created_at).toLocaleDateString('id-ID')}</td>
                            </tr>`;
                    });

                    $('#user-report-list-body').html(rows || '<tr><td colspan="3" class="text-center">Belum ada laporan.</td></tr>');
                } catch (err) {
                    $('#user-report-list-body').html('<tr><td colspan="3" class="text-center text-danger">Gagal memuat laporan.</td></tr>');
                }
            }

            fetchUserDashboard();
        });
    </script>
</body>
</html>
