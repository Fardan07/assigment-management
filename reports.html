<!DOCTYPE html>
<html lang="id">
<head>
    <base href="./" />
    <title>Manajemen Laporan - Facility Helpdesk</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
</head>
<body id="kt_app_body" data-kt-app-header-fixed-mobile="true" data-kt-app-sidebar-enabled="true" data-kt-app-sidebar-fixed="true" class="app-default">
    <div class="d-flex flex-column flex-root app-root" id="kt_app_root">
        <div class="app-page flex-column flex-column-fluid" id="kt_app_page">
            <div id="kt_app_header" class="app-header">
                <div class="app-container container-fluid d-flex flex-stack" id="kt_app_header_container">
                    <div class="page-title d-flex flex-column justify-content-center flex-wrap me-3">
                        <h1 class="page-heading d-flex text-dark fw-bold fs-3 flex-column justify-content-center my-0">Manajemen Laporan</h1>
                        <ul class="breadcrumb breadcrumb-separatorless fw-semibold fs-7 my-0 pt-1">
                            <li class="breadcrumb-item text-muted">Operasional</li>
                            <li class="breadcrumb-item"><span class="bullet bg-gray-400 w-5px h-2px"></span></li>
                            <li class="breadcrumb-item text-dark">Laporan Kerusakan</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="app-wrapper flex-column flex-row-fluid" id="kt_app_wrapper">
                <div id="kt_app_sidebar" class="app-sidebar flex-column"></div>
                <div class="app-main flex-column flex-row-fluid" id="kt_app_main">
                    <div class="d-flex flex-column flex-column-fluid">
                        <div id="kt_app_content" class="app-content flex-column-fluid">
                            <div id="kt_app_content_container" class="app-container container-fluid">
                                
                                <div class="card shadow-sm">
                                    <div class="card-header border-0 pt-6">
                                        <div class="card-title">
                                            <div class="d-flex align-items-center position-relative my-1 me-3">
                                                <select id="filter-category" class="form-select form-control-solid w-200px" data-control="select2" data-hide-search="true" data-placeholder="Semua Kategori">
                                                    <option value="">Semua Kategori</option>
                                                </select>
                                            </div>
                                            <div class="d-flex align-items-center position-relative my-1">
                                                <i class="ki-outline ki-magnifier fs-3 position-absolute ms-5"></i>
                                                <input type="text" data-kt-report-table-filter="search" class="form-control form-control-solid w-250px ps-13" placeholder="Cari laporan..." />
                                            </div>
                                        </div>
                                        <div class="card-toolbar">
                                            <button type="button" class="btn btn-primary" id="btn-add-report">
                                            <i class="ki-outline ki-plus fs-2"></i>Buat Laporan Baru</button>
                                        </div>
                                    </div>
                                    <div class="card-body py-4">
                                        <table class="table align-middle table-row-dashed fs-6 gy-5" id="report-table">
                                            <thead>
                                                <tr class="text-start text-muted fw-bold fs-7 text-uppercase gs-0">
                                                    <th class="min-w-100px">ID Laporan</th>
                                                    <th class="min-w-150px">Fasilitas</th>
                                                    <th class="min-w-100px">Lokasi</th>
                                                    <th class="min-w-100px">Urgensi</th>
                                                    <th class="min-w-100px">Status</th>
                                                    <th class="text-end min-w-100px">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody class="text-gray-600 fw-semibold">
                                                </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-report" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered mw-650px">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="fw-bold">Input Laporan Kerusakan</h2>
                    <div class="btn btn-icon btn-sm btn-active-icon-primary" data-bs-dismiss="modal">
                        <i class="ki-outline ki-cross fs-1"></i>
                    </div>
                </div>
                <div class="modal-body py-10 px-lg-17">
                    <form id="form-report" class="form">
                        <div class="fv-row mb-7">
                            <div class="d-flex flex-stack mb-2">
                                <label class="fs-6 fw-bold">Pilih Aset Fasilitas</label>
                                <div class="form-check form-switch form-check-custom form-check-solid form-check-sm">
                                    <input class="form-check-input" type="checkbox" id="toggle-manual-asset" value="1"/>
                                    <label class="form-check-label text-muted fs-7" for="toggle-manual-asset">Data tidak ada? (Manual)</label>
                                </div>
                            </div>
                            <div id="wrapper-asset-select">
                                <select class="form-select form-control-solid" name="facility_id" id="select_facility_id" data-control="select2" data-dropdown-parent="#modal-report" data-placeholder="Ketik untuk mencari aset (abjad/serial)...">
                                    <option value="">Pilih Aset...</option>
                                </select>
                            </div>
                            <div id="wrapper-asset-manual" style="display: none;">
                                <input type="text" class="form-control form-control-solid" name="manual_facility_name" placeholder="Ketik nama aset secara manual..." />
                            </div>
                        </div>
                        <div class="fv-row mb-7">
                            <label class="required fs-6 fw-bold mb-2">Judul Kerusakan</label>
                            <input type="text" class="form-control form-control-solid" name="title" placeholder="Contoh: AC Mati Total" />
                        </div>
                        <div class="row g-9 mb-7">
                            <div class="col-md-6 fv-row">
                                <label class="required fs-6 fw-bold mb-2">Kategori</label>
                                <select class="form-select form-control-solid" name="category">
                                    <option value="AC">AC & Pendingin</option>
                                    <option value="Listrik">Kelistrikan</option>
                                    <option value="Air">Saluran Air</option>
                                    <option value="Furniture">Furniture/Meja/Kursi</option>
                                </select>
                            </div>
                            <div class="col-md-6 fv-row">
                                <label class="required fs-6 fw-bold mb-2">Tingkat Urgensi</label>
                                <select class="form-select form-control-solid" name="urgency">
                                    <option value="Normal">Normal</option>
                                    <option value="Sedang">Penting</option>
                                    <option value="Darurat">Darurat (Segera)</option>
                                </select>
                            </div>
                        </div>
                        <div class="fv-row mb-7">
                            <label class="required fs-6 fw-bold mb-2">Deskripsi Detail</label>
                            <textarea class="form-control form-control-solid" name="description" rows="3"></textarea>
                        </div>                          
                          <div class="fv-row mb-7">
                              <label class="fs-6 fw-bold mb-2">Pilih Aset/Fasilitas (Opsional)</label>
                              <select class="form-select form-control-solid" name="facility_id" id="facility-select" data-control="select2" data-placeholder="Cari nama aset, kode atau ruangan..." data-allow-clear="true">
                                  <option></option>
                              </select>
                              <div class="text-muted fs-7 mt-2">Jika aset ditemukan, Lantai dan Ruangan akan otomatis terisi oleh sistem. Jika tidak, silakan isi manual di bawah ini.</div>
                          </div>
                        <div class="row g-9 mb-7">
                            <div class="col-md-4 fv-row">
                                <label class="fs-6 fw-bold mb-2">Lokasi Lantai</label>
                                <input type="text" class="form-control form-control-solid" name="location_floor" placeholder="Contoh: 3" />
                            </div>
                            <div class="col-md-4 fv-row">
                                <label class="fs-6 fw-bold mb-2">Lokasi Ruangan</label>
                                <input type="text" class="form-control form-control-solid" name="location_room" placeholder="Contoh: Ruang Meeting" />
                            </div>
                            <div class="col-md-4 fv-row">
                                <label class="fs-6 fw-bold mb-2">Detail Lokasi</label>
                                <input type="text" class="form-control form-control-solid" name="location_detail" placeholder="Contoh: Sisi Timur" />
                            </div>
                        </div>
                        <div class="fv-row mb-7">
                            <label class="fs-6 fw-bold mb-2">Foto Masalah (Opsional)</label>
                            <input type="file" class="form-control form-control-solid" name="photo_before" accept="image/*" />
                            <small class="text-muted">Format: JPG, PNG, GIF. Maksimal 5MB</small>
                            <div id="photo-preview" class="mt-3"></div>
                        </div>
                        <div class="text-center pt-15">
                            <button type="reset" class="btn btn-light me-3" data-bs-dismiss="modal">Batal</button>
                            <button type="submit" class="btn btn-primary">
                                <span class="indicator-label">Kirim Laporan</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/plugins/global/plugins.bundle.js"></script>
    <script src="assets/js/scripts.bundle.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
